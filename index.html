    <script>
(function(){
  var s=document.getElementById("lx-splash");
  if(!s)return;
  // Hide when React dispatches react-mounted event
  document.addEventListener("react-mounted",function(){
    s.style.opacity="0";setTimeout(function(){s.style.display="none"},600);
  });
  // Also hide when the React root renders
  var check = setInterval(function(){
    if(document.getElementById("root") && document.getElementById("root").children.length > 0){
      s.style.opacity="0";setTimeout(function(){s.style.display="none";clearInterval(check)},600);
    }
  }, 100);
  // Fallback: hide after 8s regardless
  setTimeout(function(){
    if(s.style.display !== "none"){
      s.style.opacity="0";setTimeout(function(){s.style.display="none"},600);
    }
  }, 8000);
})();
    </script>
    <div id="root"></div>
