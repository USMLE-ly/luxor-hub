<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LEXOR — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0A0A0B; color: #f5f5f5;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; padding: 2rem; text-align: center;
    }
    .logo { font-size: 3rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 1rem; }
    .logo span { color: #C8A951; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #888; margin-bottom: 2rem; max-width: 320px; line-height: 1.6; }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; opacity: 0.6; }
    .retry-btn {
      background: #C8A951; color: #0A0A0B; border: none;
      padding: 0.75rem 2rem; border-radius: 12px; font-size: 1rem;
      font-weight: 600; cursor: pointer; text-decoration: none;
    }
    .retry-btn:hover { background: #d4b85a; }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <div class="logo">LEX<span>OR</span></div>
  <h1>You're Offline</h1>
  <p>Don't worry — your style never goes out of fashion. Connect to the internet and try again.</p>
  <button class="retry-btn" onclick="window.location.reload()">Try Again</button>
  <script>
    // Auto-retry when back online
    window.addEventListener('online', () => { window.location.reload(); });
  </script>
</body>
</html>
