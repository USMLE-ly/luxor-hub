server {
    listen 80;
    server_name api.luxor.ly;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.luxor.ly;

    ssl_certificate /etc/letsencrypt/live/api.luxor.ly/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.luxor.ly/privkey.pem;

    # Proxy to Flask/Gunicorn
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        
        # Max upload size (for image analysis)
        client_max_body_size 20M;
    }

    # Cache static assets
    location ~* \.(mp4|jpg|png|css|js)$ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
